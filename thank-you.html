<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thanks for voting</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f3f4f6;
        font-family: Arial, sans-serif;
      }

      .card {
        background: white;
        color: #111827;
        width: min(90vw, 560px);
        padding: 1.5rem;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
      }

      a {
        color: #2563eb;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Thanks for your vote!</h1>
      <p>Your response was submitted.</p>
      <p><a href="/">Back to poll</a></p>
    </main>
  </body>
</html>
