<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kinds Crystal Optimizer Questions</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Arial, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f3f4f6;
      }

      .card {
        background: #ffffff;
        color: #111827;
        width: min(92vw, 620px);
        padding: 1.5rem;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
      }

      h1 {
        margin-top: 0;
        font-size: 1.5rem;
      }

      p {
        margin-bottom: 1rem;
        line-height: 1.5;
      }

      fieldset {
        border: 0;
        padding: 0;
        margin: 0;
      }

      .choice {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 0.75rem;
      }

      .hidden {
        position: absolute;
        left: -9999px;
      }

      label {
        display: block;
        margin-bottom: 0.35rem;
        font-weight: 600;
      }

      textarea {
        width: 100%;
        font: inherit;
        padding: 0.55rem;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        margin-bottom: 0.8rem;
      }

      button {
        margin-top: 0.5rem;
        border: 0;
        background: #2563eb;
        color: #fff;
        padding: 0.6rem 1rem;
        border-radius: 8px;
        cursor: pointer;
      }

      button:hover {
        background: #1d4ed8;
      }
    </style>
  </head>
  <body>
    <form
      class="card"
      name="crystal-optimizer-poll"
      method="POST"
      data-netlify="true"
      data-netlify-honeypot="bot-field"
      action="/thank-you.html"
      aria-labelledby="question-title"
    >
      <input type="hidden" name="form-name" value="crystal-optimizer-poll" />

      <p class="hidden">
        <label>
          Don’t fill this out if you’re human:
          <input name="bot-field" />
        </label>
      </p>

      <h1 id="question-title">Kinds Crystal Optimizer Questions</h1>
      <p>
        Should I make a Crystal Optimizer? I’m asking everyone to vote and share feedback.
      </p>

      <fieldset>
        <label class="choice">
          <input type="radio" name="vote" value="Yes" required />
          <span>Yes</span>
        </label>
        <label class="choice">
          <input type="radio" name="vote" value="No" />
          <span>No</span>
        </label>
      </fieldset>

      <label for="mods">Type your recommended mods</label>
      <textarea
        id="mods"
        name="recommended_mods"
        rows="5"
        placeholder="Example: Fast Crystal Routing, Better Crystal Sorting, Auto Refinery Booster"
      ></textarea>

      <button type="submit">Submit Vote</button>
    </form>
  </body>
</html>
